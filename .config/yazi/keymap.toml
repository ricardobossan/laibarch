[[mgr.prepend_keymap]]
on = ["h"]
run = "leave"
desc = "Go back to the parent directory"

[[mgr.prepend_keymap]]
on = ["l"]
run = "enter"
desc = "Enter the child directory"

[[mgr.prepend_keymap]]
on = ["k"]
run = "arrow -1"
desc = "Move cursor up"

[[mgr.prepend_keymap]]
on = ["j"]
run = "arrow 1"
desc = "Move cursor down"
