[mgr]
ratio = [1, 4, 3]
sort_by = "mtime"
sort_sensitive = false
sort_reverse = true
sort_dir_first = true
linemode = "size"
show_hidden = true
show_symlink = true

[preview]
tab_size = 2
max_width = 600
max_height = 900
cache_dir = ""
image_filter = "lanczos3"
image_quality = 90
sixel_fraction = 15
ueberzug_scale = 1
ueberzug_offset_x = 0
ueberzug_offset_y = 0

# Force ueberzugpp
[adapter]
use = "ueberzug"

[opener]
edit = [
    { run = '$EDITOR "$@"', block = true },
]
open = [
    { run = 'xdg-open "$@"', desc = "Open" },
]
reveal = [
    { run = 'xdg-open "$(dirname "$0")"', desc = "Reveal" },
]

[open]
rules = [
    { mime = "text/*", use = "edit" },
    { mime = "application/pdf", use = "open" },
    { mime = "image/*", use = "open" },
    { mime = "video/*", use = "open" },
    { mime = "audio/*", use = "open" },
    { mime = "inode/directory", use = "open" },
]
